<!DOCTYPE html> 
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>દાડમ બિલ કેલ્ક્યુલેટર</title>
    <style>
        :root { --primary-red: #8b0000; --bg-yellow: #fff9c4; --success-green: #2e7d32; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        
        .card { position: relative; background: white; border: 2px solid var(--primary-red); border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; padding-bottom: 10px; }
        
        .watermark-main { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 80px; color: rgba(0, 0, 0, 0.03); z-index: 0; pointer-events: none; font-weight: bold; user-select: none; white-space: nowrap; }

        .header, .row, table, .btn-container, .footer-box, .btn-download, .credit-text { position: relative; z-index: 2; }

        .header { background: var(--bg-yellow); padding: 15px; text-align: center; border-bottom: 2px solid var(--primary-red); }
        .row { display: flex; align-items: center; padding: 8px 15px; border-bottom: 1px solid #eee; }
        .row label { width: 80px; font-weight: bold; font-size: 14px; color: #444; }
        .row input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th { background: #f8f8f8; font-size: 11px; padding: 10px 2px; border-bottom: 2px solid #ddd; color: #555; }
        td { padding: 5px; text-align: center; }
        td input { width: 90%; padding: 8px 2px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-size: 14px; }

        /* બટન માટેનો ખાસ સુધારો */
        .btn-container { 
            display: flex; 
            justify-content: center; 
            gap: 50px; /* બે બટન વચ્ચેની જગ્યા */
            padding: 15px; 
        }
        .btn-circle { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            border: none; 
            color: white; 
            font-size: 30px; /* આઇકોનની સાઈઝ */
            font-weight: bold;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.2s; 
            box-shadow: 0 4px rgba(0,0,0,0.2); 
        }
        .btn-add { background-color: #1b5e20; }
        .btn-remove { background-color: #d32f2f; }
        .btn-circle:active { transform: translateY(3px); box-shadow: none; }

        .footer-box { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 15px; margin: 5px 10px; border-radius: 8px; }
        .blue { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
        .red { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .avg-row { background: #fffde7; color: #f57f17; border: 1px solid #ffe082; }
        .green { background: #e8f5e9; color: var(--success-green); border: 2px solid var(--success-green); font-size: 18px; }
        
        .charge-input { width: 45px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-weight: bold; }
        .btn-download { background-color: #0277bd; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; width: calc(100% - 30px); margin: 15px; cursor: pointer; transition: 0.3s; }
        .credit-text { text-align: center; font-size: 12px; color: #888; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="watermark-main">Kishu</div>
    <div class="header">
        <h3 style="margin:0; color:var(--primary-red);">દાડમ વેચાણ બિલ</h3>
    </div>
    <div class="row"><label>તારીખ:</label><input type="date" id="billDate"></div>
    <div class="row"><label>મંડી:</label><input type="text" id="mandiName" placeholder="મંડીનું નામ"></div>
    <div class="row"><label>ખેડૂત:</label><input type="text" id="farmerName" placeholder="ખેડૂતનું નામ"></div>

    <table>
        <thead>
            <tr>
                <th>ક્રમ.</th>
                <th>કેરેટ</th>
                <th>વજન (kg)</th>
                <th>20kg ભાવ</th>
                <th>1kg ભાવ</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <div class="btn-container">
        <button class="btn-circle btn-add" onclick="addRow()">+</button>
        <button class="btn-circle btn-remove" onclick="removeRow()">−</button>
   </div>

    <div class="footer-box blue">
        <span>કુલ કેરેટ: <span id="total-crates">0</span></span>
        <span>કુલ વજન: <span id="total-w">0.00</span> kg</span>
    </div>
    <div class="footer-box red">
        <span>કમિશન (<input type="number" id="commRate" value="3" class="charge-input" oninput="calculate()">%)</span>
        <span>₹ <span id="comm-val">0.00</span></span>
    </div>
    <div class="footer-box red">
        <span>ભાડું (₹ <input type="number" id="perCrateRate" value="15" class="charge-input" oninput="calculate()">)</span>
        <span>₹ <span id="total-crate-charge">0.00</span></span>
    </div>
    <div class="footer-box avg-row">
        <span>નેટ એવરેજ:</span>
        <span>₹ <span id="net-avg">0.00</span> /kg</span>
    </div>
    <div class="footer-box green">
        <span>ચોખ્ખી રકમ:</span>
        <span>₹ <span id="net-amt">0.00</span></span>
    </div>

    <button class="btn-download" onclick="window.print()">🖨️ બિલ પ્રિન્ટ / ડાઉનલોડ કરો</button>
    <div class="credit-text">Design & Developed by: Kishu</div>
</div>

<script>
    const tableBody = document.getElementById('table-body');
    window.onload = function() {
        for(let i=0; i<5; i++) { addRow(); }
        document.getElementById('billDate').valueAsDate = new Date();
    };

    function addRow() {
        const row = tableBody.insertRow();
        row.innerHTML = `
            <td class="row-index"></td>
            <td><input type="number" class="crate" oninput="calculate()" placeholder="0"></td>
            <td><input type="number" class="weight" oninput="calculate()" placeholder="0.00"></td>
            <td><input type="number" class="rate20" oninput="syncRates(this, 'rate20')" placeholder="0"></td>
            <td><input type="number" class="rate1" oninput="syncRates(this, 'rate1')" placeholder="0"></td>
        `;
        updateRowNumbers();
    }

    function removeRow() {
        if (tableBody.rows.length > 1) { 
            tableBody.deleteRow(tableBody.rows.length - 1);
            calculate();
        }
    }

    function updateRowNumbers() {
        const rows = document.querySelectorAll(".row-index");
        rows.forEach((td, index) => { td.innerText = index + 1; });
    }

    function syncRates(inputElement, type) {
        let row = inputElement.closest("tr");
        let rate20 = row.querySelector(".rate20");
        let rate1 = row.querySelector(".rate1");
        if (type === 'rate20') {
            rate1.value = rate20.value ? (parseFloat(rate20.value) / 20).toFixed(2) : "";
        } else {
            rate20.value = rate1.value ? (parseFloat(rate1.value) * 20).toFixed(2) : "";
        }
        calculate();
    }

    function calculate() {
        let rows = document.querySelectorAll("#table-body tr");
        let totalCrates = 0, totalWeight = 0, grandTotal = 0;
        rows.forEach(row => {
            let crate = parseFloat(row.querySelector(".crate").value) || 0;
            let weight = parseFloat(row.querySelector(".weight").value) || 0;
            let rate1 = parseFloat(row.querySelector(".rate1").value) || 0;
            totalCrates += crate;
            totalWeight += weight;
            grandTotal += (weight * rate1);
        });
        let commPercent = parseFloat(document.getElementById("commRate").value) || 0;
        let commission = grandTotal * (commPercent / 100);
        let rentCharge = totalCrates * (parseFloat(document.getElementById("perCrateRate").value) || 0);
        let netAmt = grandTotal - commission - rentCharge;
        document.getElementById("total-crates").innerText = totalCrates;
        document.getElementById("total-w").innerText = totalWeight.toFixed(2);
        document.getElementById("comm-val").innerText = commission.toFixed(2);
        document.getElementById("total-crate-charge").innerText = rentCharge.toFixed(2);
        document.getElementById("net-amt").innerText = netAmt.toFixed(2);
        document.getElementById("net-avg").innerText = totalWeight > 0 ? (netAmt / totalWeight).toFixed(2) : "0.00";
    }
</script>

</body>
</html>
